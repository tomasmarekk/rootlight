syntax = "proto3";

package rootlight.daemon.v1;

import "common.proto";

// Client-supported protocol range, capabilities, and authenticated session identity.
message ClientHello {
  rootlight.common.v1.VersionRange supported_protocols = 1;
  repeated string capabilities = 2;
  bytes expected_instance_nonce = 3;
  bytes client_instance_id = 4;
}

// Server-selected protocol and the bounded negotiation result.
message ServerHello {
  rootlight.common.v1.ContractVersion selected_protocol = 1;
  repeated string capabilities = 2;
  optional rootlight.common.v1.PublicError error = 3;
  bytes instance_nonce = 4;
}

// Bounded request envelope for one local daemon operation.
message RequestEnvelope {
  uint64 request_id = 1;
  bytes instance_nonce = 2;
  optional uint32 timeout_ms = 3;
  oneof request {
    HealthRequest health = 10;
    OperationStatusRequest operation_status = 11;
    OperationCancelRequest operation_cancel = 12;
    OperationSubmitRequest operation_submit = 13;
    OperationLeaseRenewRequest operation_lease_renew = 14;
    DiagnosticsQuickRequest diagnostics_quick = 15;
    SupportBundleRequest support_bundle = 16;
    RepositoryIndexRequest repository_index = 30;
    RepositoryOperationStatusRequest repository_operation_status = 31;
    CodeLocateRequest code_locate = 32;
    SymbolExplainRequest symbol_explain = 33;
    SourceReadRequest source_read = 34;
    RepositoryListRequest repository_list = 35;
    RepositoryStatusRequest repository_status = 36;
    SymbolRelationshipsRequest symbol_relationships = 37;
    FlowTraceRequest flow_trace = 38;
    ArchitectureCyclesRequest architecture_cycles = 39;
    CodeDeadRequest code_dead = 40;
    ArchitectureOverviewRequest architecture_overview = 41;
  }
}

// Bounded response envelope paired with one request identifier.
message ResponseEnvelope {
  uint64 request_id = 1;
  oneof response {
    HealthResponse health = 10;
    OperationStatusResponse operation_status = 11;
    OperationCancelResponse operation_cancel = 12;
    OperationSubmitResponse operation_submit = 13;
    OperationLeaseRenewResponse operation_lease_renew = 14;
    DiagnosticsQuickResponse diagnostics_quick = 15;
    SupportBundleResponse support_bundle = 16;
    RepositoryIndexResponse repository_index = 30;
    RepositoryOperationStatusResponse repository_operation_status = 31;
    CodeLocateResponse code_locate = 32;
    SymbolExplainResponse symbol_explain = 33;
    SourceReadResponse source_read = 34;
    RepositoryListResponse repository_list = 35;
    RepositoryStatusResponse repository_status = 36;
    SymbolRelationshipsResponse symbol_relationships = 37;
    FlowTraceResponse flow_trace = 38;
    ArchitectureCyclesResponse architecture_cycles = 39;
    CodeDeadResponse code_dead = 40;
    ArchitectureOverviewResponse architecture_overview = 41;
    rootlight.common.v1.PublicError error = 20;
  }
}

// Source-free daemon health request.
message HealthRequest {}

// Source-free daemon lifecycle state.
enum DaemonLifecycle {
  DAEMON_LIFECYCLE_UNSPECIFIED = 0;
  STARTING = 1;
  READY = 2;
  DRAINING = 3;
  FAULTED = 4;
  STOPPED = 5;
}

// Closed status for one daemon subsystem.
enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_HEALTHY = 1;
  HEALTH_STATUS_DEGRADED = 2;
  HEALTH_STATUS_UNAVAILABLE = 3;
  HEALTH_STATUS_NOT_CONFIGURED = 4;
  HEALTH_STATUS_FAILED = 5;
}

// Closed classification for bounded host resource pressure.
enum ResourcePressure {
  RESOURCE_PRESSURE_UNSPECIFIED = 0;
  RESOURCE_PRESSURE_NORMAL = 1;
  RESOURCE_PRESSURE_ELEVATED = 2;
  RESOURCE_PRESSURE_HIGH = 3;
  RESOURCE_PRESSURE_CRITICAL = 4;
  RESOURCE_PRESSURE_UNKNOWN = 5;
}

// Source-free daemon health and readiness response.
message HealthResponse {
  bool ready = 1;
  uint32 active_operations = 2;
  uint32 admitted_operations = 3;
  string protocol_version = 4;
  DaemonLifecycle lifecycle = 5;
  bool accepting_operations = 6;
  uint32 active_connections = 7;
  uint32 connection_limit = 8;
  uint32 queued_operations = 9;
  uint32 running_operations = 10;
  uint32 operation_queue_limit = 11;
  bool journal_healthy = 12;
  HealthStatus catalog_status = 13;
  uint32 catalog_schema_version = 14;
  HealthStatus generation_status = 15;
  HealthStatus adapter_status = 16;
  HealthStatus watcher_status = 17;
  ResourcePressure resource_pressure = 18;
  HealthStatus endpoint_status = 19;
  uint32 endpoint_schema_version = 20;
}

// Requests bounded source-free catalog diagnostics.
message DiagnosticsQuickRequest {}

// Closed diagnostic checks supported by the current control plane.
enum DiagnosticCheck {
  DIAGNOSTIC_CHECK_UNSPECIFIED = 0;
  DIAGNOSTIC_CHECK_CATALOG_QUICK_CHECK = 1;
}

// Closed outcome for one diagnostic check.
enum DiagnosticOutcome {
  DIAGNOSTIC_OUTCOME_UNSPECIFIED = 0;
  DIAGNOSTIC_OUTCOME_PASSED = 1;
  DIAGNOSTIC_OUTCOME_FAILED = 2;
  DIAGNOSTIC_OUTCOME_TIMED_OUT = 3;
  DIAGNOSTIC_OUTCOME_UNAVAILABLE = 4;
}

// One source-free bounded diagnostic result.
message DiagnosticResult {
  DiagnosticCheck check = 1;
  DiagnosticOutcome outcome = 2;
  uint32 duration_ms = 3;
  optional rootlight.common.v1.PublicError error = 4;
}

// Bounded quick-diagnostics response.
message DiagnosticsQuickResponse {
  uint32 schema_version = 1;
  HealthStatus overall_status = 2;
  repeated DiagnosticResult results = 3;
}

// Requests a bounded source-free support bundle.
message SupportBundleRequest {}

// Returns one validated in-memory support archive.
message SupportBundleResponse {
  uint32 schema_version = 1;
  bytes archive = 2;
  bytes sha256 = 3;
  uint64 archive_bytes = 4;
  bool contains_source = 5;
}

// Durable operation lifecycle state.
enum OperationState {
  OPERATION_STATE_UNSPECIFIED = 0;
  QUEUED = 1;
  RUNNING = 2;
  CANCELLING = 3;
  SUCCEEDED = 4;
  FAILED = 5;
  INTERRUPTED = 6;
  CANCELLED = 7;
}

// Closed operation kinds supported by the current control plane.
enum OperationKind {
  OPERATION_KIND_UNSPECIFIED = 0;
  CONTROL_PROBE = 1;
  REPOSITORY_INDEX = 2;
}

// Monotonic infrastructure stages for the bounded control probe.
enum OperationStage {
  OPERATION_STAGE_UNSPECIFIED = 0;
  ACCEPTED = 1;
  EXECUTING = 2;
  CLEANUP = 3;
}

// Why a recovered operation did not continue automatically.
enum RecoveryClass {
  RECOVERY_CLASS_UNSPECIFIED = 0;
  NOT_APPLICABLE = 1;
  INTERRUPTED_BY_RESTART = 2;
  DEADLINE_ELAPSED = 3;
  LEASE_EXPIRED = 4;
}

// Durable operation status safe for local clients.
message OperationStatus {
  rootlight.common.v1.OperationId operation = 1;
  OperationState state = 2;
  uint64 revision = 3;
  uint32 completed_units = 4;
  uint32 total_units = 5;
  optional rootlight.common.v1.PublicError error = 6;
  OperationKind kind = 7;
  OperationStage stage = 8;
  bytes plan_hash = 9;
  bool detached = 10;
  bool cancellation_requested = 11;
  optional uint64 deadline_unix_ms = 12;
  optional uint64 lease_expires_unix_ms = 13;
  RecoveryClass recovery_class = 14;
}

// Requests the latest durable state for one operation.
message OperationStatusRequest {
  rootlight.common.v1.OperationId operation = 1;
}

// Returns one durable operation state.
message OperationStatusResponse {
  OperationStatus operation = 1;
}

// Requests cooperative cancellation for one operation.
message OperationCancelRequest {
  rootlight.common.v1.OperationId operation = 1;
}

// Reports whether cancellation was newly requested.
message OperationCancelResponse {
  OperationStatus operation = 1;
  bool accepted = 2;
}

// Submits one bounded operation definition for durable admission.
message OperationSubmitRequest {
  rootlight.common.v1.OperationId operation = 1;
  OperationKind kind = 2;
  bytes plan_hash = 3;
  bool detached = 4;
  optional uint64 timeout_ms = 5;
  optional uint64 deadline_unix_ms = 6;
  optional uint64 lease_expires_unix_ms = 7;
}

// Returns the newly queued durable operation.
message OperationSubmitResponse {
  OperationStatus operation = 1;
}

// Extends one attached operation lease for its authenticated owner.
message OperationLeaseRenewRequest {
  rootlight.common.v1.OperationId operation = 1;
  uint64 lease_expires_unix_ms = 2;
}

// Returns the durable operation after lease renewal.
message OperationLeaseRenewResponse {
  OperationStatus operation = 1;
}

// Selects the active or one explicit immutable repository generation.
message GenerationSelector {
  oneof selector {
    bool active = 1;
    rootlight.common.v1.GenerationId generation = 2;
  }
}

// One generation-bound immutable source reference.
message FirstSliceSourceRef {
  rootlight.common.v1.RepositoryId repository = 1;
  rootlight.common.v1.GenerationId generation = 2;
  rootlight.common.v1.FileId file = 3;
  uint64 start_byte = 4;
  uint64 end_byte = 5;
  rootlight.common.v1.ContentHash content_hash = 6;
  optional uint64 start_line = 7;
  optional uint64 end_line = 8;
}

// Requests admission of the supported whole-root Rust fixture index plan.
message RepositoryIndexRequest {
  rootlight.common.v1.ContractVersion schema_version = 1;
  string root = 2;
  rootlight.common.v1.OperationId operation = 3;
  bool detached = 4;
}

// Reports the admitted first-slice indexing operation.
message RepositoryIndexResponse {
  rootlight.common.v1.ContractVersion schema_version = 1;
  rootlight.common.v1.RepositoryId repository = 2;
  rootlight.common.v1.OperationId operation = 3;
  OperationState state = 4;
  uint64 revision = 5;
  optional rootlight.common.v1.GenerationId parent_generation = 6;
  optional rootlight.common.v1.GenerationId published_generation = 7;
  uint64 discovered_inputs = 8;
  uint64 indexed_files = 9;
  uint64 entities = 10;
  uint64 elapsed_micros = 11;
}

// Action accepted by the first-slice operation status request.
enum RepositoryOperationAction {
  REPOSITORY_OPERATION_ACTION_UNSPECIFIED = 0;
  REPOSITORY_OPERATION_GET = 1;
  REPOSITORY_OPERATION_CANCEL = 2;
}

// Reads or cooperatively cancels one operation created by repository indexing.
message RepositoryOperationStatusRequest {
  rootlight.common.v1.ContractVersion schema_version = 1;
  rootlight.common.v1.OperationId operation = 2;
  RepositoryOperationAction action = 3;
  optional uint32 wait_ms = 4;
  optional uint64 after_revision = 5;
}

// Returns journal state plus same-process first-slice publication metadata.
message RepositoryOperationStatusResponse {
  rootlight.common.v1.ContractVersion schema_version = 1;
  OperationStatus operation = 2;
  optional rootlight.common.v1.GenerationId published_generation = 3;
  uint64 started_unix_ms = 4;
  uint64 peak_rss_bytes = 5;
  uint64 written_bytes = 6;
  uint64 files_examined = 7;
  optional uint32 retry_after_ms = 8;
}

// First-slice lexical locate mode.
enum FirstSliceLocateMode {
  FIRST_SLICE_LOCATE_MODE_UNSPECIFIED = 0;
  FIRST_SLICE_LOCATE_EXACT = 1;
  FIRST_SLICE_LOCATE_PREFIX = 2;
  FIRST_SLICE_LOCATE_TEXT = 3;
  FIRST_SLICE_LOCATE_SAFE_REGEX = 4;
  FIRST_SLICE_LOCATE_GLOB = 5;
}

// Aggregate support tier for one first-slice response.
enum FirstSliceAnalysisTier {
  FIRST_SLICE_ANALYSIS_TIER_UNSPECIFIED = 0;
  FIRST_SLICE_TIER_A = 1;
  FIRST_SLICE_TIER_B = 2;
  FIRST_SLICE_TIER_C = 3;
  FIRST_SLICE_TIER_D = 4;
}

// Aggregate completeness for one first-slice response.
enum FirstSliceCoverageStatus {
  FIRST_SLICE_COVERAGE_STATUS_UNSPECIFIED = 0;
  FIRST_SLICE_COVERAGE_COMPLETE = 1;
  FIRST_SLICE_COVERAGE_BOUNDED = 2;
  FIRST_SLICE_COVERAGE_SAMPLED = 3;
  FIRST_SLICE_COVERAGE_UNKNOWN = 4;
}

// Bounded measured usage for one first-slice query.
message FirstSliceQueryUsage {
  uint64 rows = 1;
  uint64 edges = 2;
  uint64 results = 3;
  uint64 source_bytes = 4;
  uint64 json_bytes = 5;
  uint64 estimated_tokens = 6;
  uint64 elapsed_micros = 7;
}

// Common repository, generation, coverage, and usage correlation.
message FirstSliceQueryContext {
  rootlight.common.v1.RepositoryId repository = 1;
  rootlight.common.v1.GenerationId generation = 2;
  optional rootlight.common.v1.GenerationId parent_generation = 3;
  bool active_generation = 4;
  FirstSliceAnalysisTier tier = 5;
  FirstSliceCoverageStatus coverage_status = 6;
  uint64 skipped_inputs = 7;
  FirstSliceQueryUsage usage = 8;
}

// Requests one bounded generation-pinned lexical lookup.
message CodeLocateRequest {
  rootlight.common.v1.ContractVersion schema_version = 1;
  rootlight.common.v1.RepositoryId repository = 2;
  GenerationSelector generation = 3;
  string query = 4;
  FirstSliceLocateMode mode = 5;
  uint32 maximum_results = 6;
}

// One typed lexical lookup result.
message FirstSliceLocateHit {
  rootlight.common.v1.SymbolId symbol = 1;
  rootlight.common.v1.FileId file = 2;
  string identifier = 3;
  string qualified_name = 4;
  string path = 5;
  string kind = 6;
  string language = 7;
  FirstSliceAnalysisTier tier = 8;
  bool generated = 9;
  uint32 score = 10;
  optional FirstSliceSourceRef source = 11;
}

// Returns bounded typed lexical results and generation correlation.
message CodeLocateResponse {
  rootlight.common.v1.ContractVersion schema_version = 1;
  FirstSliceQueryContext context = 2;
  repeated FirstSliceLocateHit hits = 3;
  uint64 matched_candidates = 4;
  bool truncated = 5;
}

// Requests bounded explanations for stable symbols.
message SymbolExplainRequest {
  rootlight.common.v1.ContractVersion schema_version = 1;
  rootlight.common.v1.RepositoryId repository = 2;
  GenerationSelector generation = 3;
  repeated rootlight.common.v1.SymbolId symbols = 4;
}

// One typed, compact symbol explanation.
message FirstSliceSymbolExplanation {
  rootlight.common.v1.SymbolId symbol = 1;
  string kind = 2;
  string display_name = 3;
  optional string signature = 4;
  FirstSliceSourceRef definition = 5;
  uint64 outbound_exact = 6;
  uint64 outbound_candidates = 7;
  uint64 inbound_exact = 8;
  uint64 inbound_candidates = 9;
  uint64 references_exact = 10;
  string provider = 11;
  string evidence = 12;
  uint32 confidence = 13;
}

// Returns explanations in request order and unresolved stable identities.
message SymbolExplainResponse {
  rootlight.common.v1.ContractVersion schema_version = 1;
  FirstSliceQueryContext context = 2;
  repeated FirstSliceSymbolExplanation symbols = 3;
  repeated rootlight.common.v1.SymbolId unresolved_symbols = 4;
  bool truncated = 5;
}

// Requests exact generation-bound source references.
message SourceReadRequest {
  rootlight.common.v1.ContractVersion schema_version = 1;
  rootlight.common.v1.RepositoryId repository = 2;
  GenerationSelector generation = 3;
  repeated FirstSliceSourceRef references = 4;
}

// One verified UTF-8 source chunk.
message FirstSliceSourceChunk {
  FirstSliceSourceRef source = 1;
  string path = 2;
  uint64 start_byte = 3;
  uint64 end_byte = 4;
  uint64 start_line = 5;
  uint64 end_line = 6;
  string content = 7;
  rootlight.common.v1.ContentHash content_hash = 8;
  string language = 9;
  bool generated = 10;
}

// Returns exact verified UTF-8 source chunks.
message SourceReadResponse {
  rootlight.common.v1.ContractVersion schema_version = 1;
  FirstSliceQueryContext context = 2;
  repeated FirstSliceSourceChunk chunks = 3;
  uint64 total_source_bytes = 4;
  bool truncated = 5;
}

// Requests the bounded list of repositories known to this daemon process.
message RepositoryListRequest {
  optional uint32 max_results = 1;
  optional string query = 2;
}

// One repository entry in the bounded repository list.
message RepositoryListEntry {
  rootlight.common.v1.RepositoryId repository = 1;
  rootlight.common.v1.GenerationId active_generation = 2;
  repeated string languages = 3;
  string structural_freshness = 4;
  string semantic_freshness = 5;
  string state = 6;
}

// Returns the bounded list of repositories with their active generation.
message RepositoryListResponse {
  repeated RepositoryListEntry repositories = 1;
}

// Requests the status of one repository known to this daemon process.
message RepositoryStatusRequest {
  rootlight.common.v1.RepositoryId repository = 1;
  GenerationSelector generation = 2;
}

// One language-scoped coverage entry for one repository generation.
message RepositoryCoverageEntry {
  string language = 1;
  string tier = 2;
  string status = 3;
  uint64 discovered_files = 4;
  uint64 indexed_files = 5;
}

// Reports one repository's active generation, freshness, and coverage.
message RepositoryStatusResponse {
  rootlight.common.v1.RepositoryId repository = 1;
  rootlight.common.v1.GenerationId active_generation = 2;
  optional rootlight.common.v1.GenerationId parent_generation = 3;
  string structural_freshness = 4;
  string semantic_freshness = 5;
  string state = 6;
  repeated RepositoryCoverageEntry coverage = 7;
}

// Requests bounded typed relation neighborhoods for stable symbols.
message SymbolRelationshipsRequest {
  rootlight.common.v1.ContractVersion schema_version = 1;
  rootlight.common.v1.RepositoryId repository = 2;
  GenerationSelector generation = 3;
  repeated rootlight.common.v1.SymbolId seeds = 4;
  repeated string relations = 5;
  optional string direction = 6;
  optional uint32 min_confidence = 7;
  optional uint32 max_results = 8;
}

// One typed relationship target within a seed-relation group.
message FirstSliceRelationshipTarget {
  rootlight.common.v1.SymbolId symbol = 1;
  uint32 confidence = 2;
  repeated FirstSliceSourceRef source_refs = 3;
}

// One seed-relation group in the relationship response.
message FirstSliceRelationshipGroup {
  rootlight.common.v1.SymbolId seed = 1;
  string relation = 2;
  string direction = 3;
  repeated FirstSliceRelationshipTarget items = 4;
  uint64 total_count = 5;
}

// Returns bounded typed relation neighborhoods and generation correlation.
message SymbolRelationshipsResponse {
  rootlight.common.v1.ContractVersion schema_version = 1;
  FirstSliceQueryContext context = 2;
  repeated FirstSliceRelationshipGroup groups = 3;
  uint64 returned_edges = 4;
  uint64 total_edges = 5;
  bool exact = 6;
  bool truncated = 7;
}

// Requests bounded directed paths between stable symbols.
message FlowTraceRequest {
  rootlight.common.v1.ContractVersion schema_version = 1;
  rootlight.common.v1.RepositoryId repository = 2;
  GenerationSelector generation = 3;
  rootlight.common.v1.SymbolId from = 4;
  rootlight.common.v1.SymbolId to = 5;
  optional string direction = 6;
  repeated string relations = 7;
  optional uint32 max_depth = 8;
  optional uint32 max_paths = 9;
  optional uint32 min_confidence = 10;
}

// One evidence-bearing edge within a traced path.
message FirstSliceTraceEdge {
  string kind = 1;
  uint32 confidence = 2;
  repeated FirstSliceSourceRef source_refs = 3;
}

// One complete traced path from the source toward a reached node.
message FirstSliceTracePath {
  uint32 confidence = 1;
  repeated rootlight.common.v1.SymbolId nodes = 2;
  repeated FirstSliceTraceEdge edges = 3;
  bool cyclic = 4;
}

// Traversal boundary summary for a flow trace.
message FirstSliceTraceFrontier {
  uint32 reached_nodes = 1;
  uint32 examined_edges = 2;
  bool truncated = 3;
  uint32 unresolved_boundaries = 4;
}

// Relation projection actually used by a flow trace.
message FirstSliceTraceProjection {
  repeated string relations = 1;
  uint32 min_confidence = 2;
}

// Returns bounded directed paths and generation correlation.
message FlowTraceResponse {
  rootlight.common.v1.ContractVersion schema_version = 1;
  FirstSliceQueryContext context = 2;
  repeated FirstSliceTracePath paths = 3;
  FirstSliceTraceFrontier frontier = 4;
  FirstSliceTraceProjection projection = 5;
}

// Requests bounded architecture cycle detection over a relation projection.
message ArchitectureCyclesRequest {
  rootlight.common.v1.ContractVersion schema_version = 1;
  rootlight.common.v1.RepositoryId repository = 2;
  GenerationSelector generation = 3;
  repeated string relations = 4;
  optional uint32 min_size = 5;
  optional uint32 max_cycles = 6;
  optional bool include_self_cycles = 7;
}

// One strongly connected component containing cycles.
message FirstSliceCycleComponent {
  uint32 size = 1;
  repeated rootlight.common.v1.SymbolId members = 2;
  uint32 internal_edges = 3;
}

// One bounded representative minimal cycle with evidence.
message FirstSliceCycle {
  repeated rootlight.common.v1.SymbolId nodes = 1;
  repeated FirstSliceSourceRef edge_evidence = 2;
  uint32 confidence = 3;
}

// One candidate edge for breaking a reported cycle.
message FirstSliceCycleBreak {
  rootlight.common.v1.SymbolId from = 1;
  rootlight.common.v1.SymbolId to = 2;
  string kind = 3;
  uint32 break_cost = 4;
  repeated FirstSliceSourceRef source_refs = 5;
}

// Relation projection actually used by an architecture cycles query.
message FirstSliceCycleProjection {
  repeated string relations = 1;
  uint32 min_confidence = 2;
}

// Returns bounded architecture cycles and generation correlation.
message ArchitectureCyclesResponse {
  rootlight.common.v1.ContractVersion schema_version = 1;
  FirstSliceQueryContext context = 2;
  repeated FirstSliceCycleComponent components = 3;
  repeated FirstSliceCycle cycles = 4;
  repeated FirstSliceCycleBreak break_candidates = 5;
  FirstSliceCycleProjection projection = 6;
}

// Requests bounded dead-code reachability analysis over one generation.
message CodeDeadRequest {
  rootlight.common.v1.ContractVersion schema_version = 1;
  rootlight.common.v1.RepositoryId repository = 2;
  GenerationSelector generation = 3;
  optional string entry_point_policy = 4;
  optional bool include_exported = 5;
  optional bool include_tests = 6;
  optional uint32 min_confidence = 7;
  optional uint32 max_candidates = 8;
}

// One dead-code candidate with classification and source-free evidence.
message FirstSliceDeadCandidate {
  rootlight.common.v1.SymbolId symbol_id = 1;
  string classification = 2;
  uint32 confidence = 3;
  repeated string why = 4;
  repeated string suppressions_checked = 5;
  repeated FirstSliceSourceRef source_refs = 6;
}

// Summary of the entry-point model used for reachability.
message FirstSliceEntryPointSummary {
  string policy = 1;
  uint32 entry_point_count = 2;
  bool complete = 3;
}

// One known blind spot in the reachability analysis.
message FirstSliceBlindSpot {
  string category = 1;
  uint32 affected_count = 2;
}

// One applied false-positive suppression rule.
message FirstSliceSuppressionRule {
  string rule = 1;
  uint32 suppressed_count = 2;
}

// Returns bounded dead-code candidates and generation correlation.
message CodeDeadResponse {
  rootlight.common.v1.ContractVersion schema_version = 1;
  FirstSliceQueryContext context = 2;
  repeated FirstSliceDeadCandidate candidates = 3;
  FirstSliceEntryPointSummary entry_points = 4;
  repeated FirstSliceBlindSpot blind_spots = 5;
  repeated FirstSliceSuppressionRule false_positive_controls = 6;
}

// Requests a bounded file-granularity architecture overview over one generation.
message ArchitectureOverviewRequest {
  rootlight.common.v1.ContractVersion schema_version = 1;
  rootlight.common.v1.RepositoryId repository = 2;
  GenerationSelector generation = 3;
  repeated string views = 4;
  optional uint32 max_components = 5;
  optional bool include_edges = 6;
  optional uint32 min_confidence = 7;
}

// One aggregated architecture component keyed by its containing file.
message FirstSliceArchitectureComponent {
  string id = 1;
  string kind = 2;
  string name = 3;
  uint32 symbol_count = 4;
  repeated string responsibility_evidence = 5;
  uint32 confidence = 6;
}

// One aggregated typed connection between two architecture components.
message FirstSliceArchitectureConnection {
  string from = 1;
  string to = 2;
  string kind = 3;
  uint32 weight = 4;
  uint32 confidence = 5;
}

// One structural hotspot ranking entry for a component.
message FirstSliceHotspot {
  string component_id = 1;
  uint32 fan_in = 2;
  uint32 fan_out = 3;
  optional uint32 change_frequency = 4;
  optional uint32 complexity = 5;
  uint32 score = 6;
}

// Derived-view algorithm metadata for community or ownership algorithms.
message FirstSliceDerivedView {
  string view = 1;
  string algorithm_version = 2;
}

// Returns bounded architecture components, connections, and hotspots.
message ArchitectureOverviewResponse {
  rootlight.common.v1.ContractVersion schema_version = 1;
  FirstSliceQueryContext context = 2;
  repeated FirstSliceArchitectureComponent components = 3;
  repeated FirstSliceArchitectureConnection connections = 4;
  repeated FirstSliceHotspot hotspots = 5;
  repeated FirstSliceDerivedView views = 6;
}
