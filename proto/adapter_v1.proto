syntax = "proto3";

package rootlight.adapter.v1;

import "common.proto";

// Source-bound identity of one isolated adapter implementation.
message AdapterIdentity {
  string name = 1;
  string version = 2;
  bytes source_digest = 3;
}

// Trust origin applied before any adapter process is started.
enum AdapterTrustLevel {
  ADAPTER_TRUST_LEVEL_UNSPECIFIED = 0;
  FIRST_PARTY = 1;
  USER_PROVIDED = 2;
  UNTRUSTED = 3;
}

// Child-declared ceilings used for negotiation, never as enforcement evidence.
message ResourceLimits {
  uint64 wall_time_ms = 1;
  uint64 cpu_time_ms = 2;
  uint64 memory_bytes = 3;
  uint64 input_bytes = 4;
  uint64 output_bytes = 5;
  uint32 files = 6;
  uint32 processes = 7;
  uint32 handles = 8;
  uint32 retries = 9;
}

// Adapter protocol range, capabilities, and extension declarations.
// Trust, limits, and cancellation are mandatory beginning with protocol 1.1.
message CapabilityAdvertisement {
  AdapterIdentity adapter = 1;
  rootlight.common.v1.VersionRange supported_protocols = 2;
  repeated string capabilities = 3;
  repeated rootlight.common.v1.ExtensionDescriptor extensions = 4;
  AdapterTrustLevel trust_level = 5;
  ResourceLimits hard_limits = 6;
  bool supports_cancellation = 7;
}

// Host-selected contract sent only after validating an advertisement.
message SessionRequirements {
  bytes session_id = 1;
  rootlight.common.v1.ContractVersion selected_protocol = 2;
  AdapterIdentity expected_adapter = 3;
  repeated string required_capabilities = 4;
  repeated rootlight.common.v1.ExtensionDescriptor required_extensions = 5;
  ResourceLimits granted_limits = 6;
  AdapterTrustLevel maximum_trust = 7;
  bool require_cancellation = 8;
}

// Source-bound request for one immutable generation input.
message AnalysisRequest {
  bytes session_id = 1;
  bytes request_id = 2;
  rootlight.common.v1.RepositoryId repository = 3;
  rootlight.common.v1.GenerationId generation = 4;
  rootlight.common.v1.FileId file = 5;
  string language = 6;
  rootlight.common.v1.ContentHash build_context = 7;
  rootlight.common.v1.ContentHash source_digest = 8;
  bytes source = 9;
}

// Bounded normalized output returned by an isolated adapter.
message AnalysisResult {
  bytes session_id = 1;
  bytes request_id = 2;
  bytes normalized_ir = 3;
  rootlight.common.v1.ContentHash output_digest = 4;
}

// Cooperative cancellation for one in-flight adapter request.
message CancelRequest {
  bytes session_id = 1;
  bytes request_id = 2;
}

// Length-prefixed message union used on the adapter pipe.
message AdapterFrame {
  oneof message {
    CapabilityAdvertisement advertisement = 1;
    SessionRequirements session = 2;
    AnalysisRequest analysis_request = 3;
    AnalysisResult analysis_result = 4;
    CancelRequest cancel = 5;
    rootlight.common.v1.PublicError error = 6;
  }
}
