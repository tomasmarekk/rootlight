name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  fast:
    name: fast / pinned / linux
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pinned Rust
        run: rustup show active-toolchain
      - name: Fetch locked dependencies
        run: cargo fetch --locked
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps --locked
      - name: Tests
        run: cargo test --workspace --all-features --locked
      - name: Architecture and contracts
        run: |
          cargo run --locked --quiet --package xtask -- architecture-check
          cargo run --locked --quiet --package xtask -- generate --check
          cargo run --locked --quiet --package xtask -- compatibility-check
          cargo run --locked --quiet --package xtask -- policy-check
          cargo run --locked --quiet --package xtask -- id-vectors > target/id-vectors.actual.json
          cmp tests/fixtures/id-vectors.json target/id-vectors.actual.json
      - name: Daemon lifecycle
        run: |
          cargo build --locked --package rootlight --package rootlight-daemon --package xtask
          cargo run --locked --quiet --package xtask -- daemon-lifecycle-check --bin-dir target/debug
      - name: Clean generated tree
        run: git diff --exit-code

  msrv:
    name: msrv / 1.90.0 / linux
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      RUSTUP_TOOLCHAIN: "1.90.0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install MSRV
        run: |
          rustup toolchain install 1.90.0 --profile minimal --component clippy,rustfmt
          test "$(rustc --version)" = "$(rustup run 1.90.0 rustc --version)"
      - name: MSRV quality suite
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          cargo check --workspace --all-targets --all-features --locked
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked
          cargo doc --workspace --all-features --no-deps --locked
          cargo run --locked --quiet --package xtask -- architecture-check
          cargo run --locked --quiet --package xtask -- generate --check
          cargo run --locked --quiet --package xtask -- compatibility-check
          cargo run --locked --quiet --package xtask -- policy-check

  current-stable:
    name: current stable / linux
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install current stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          test "$(rustc --version)" = "$(rustup run stable rustc --version)"
      - name: Current-stable quality canary
        run: |
          cargo check --workspace --all-targets --all-features --locked
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked

  platform:
    name: platform / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, macos-15]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pinned Rust
        shell: bash
        run: rustup show active-toolchain
      - name: Platform contract suite
        shell: bash
        run: |
          cargo check --workspace --all-targets --all-features --locked
          cargo test --workspace --all-features --locked
          cargo run --locked --quiet --package xtask -- architecture-check
          cargo run --locked --quiet --package xtask -- generate --check
          cargo run --locked --quiet --package xtask -- compatibility-check
          cargo run --locked --quiet --package xtask -- policy-check
          cargo run --locked --quiet --package xtask -- id-vectors > target/id-vectors.actual.json
      - name: Daemon lifecycle
        shell: bash
        run: |
          cargo build --locked --package rootlight --package rootlight-daemon --package xtask
          cargo run --locked --quiet --package xtask -- daemon-lifecycle-check --bin-dir target/debug
      - name: Compare identifier vectors
        shell: pwsh
        run: |
          $expected = (Get-Content tests/fixtures/id-vectors.json -Raw).Replace("`r`n", "`n")
          $actual = (Get-Content target/id-vectors.actual.json -Raw).Replace("`r`n", "`n")
          if ($actual -cne $expected) {
            throw "identifier vectors differ from the committed fixture"
          }
      - name: Clean generated tree
        shell: bash
        run: git diff --exit-code

  vertical-slice:
    name: vertical slice / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pinned Rust
        shell: bash
        run: rustup show active-toolchain
      - name: Build vertical-slice binaries
        shell: bash
        run: cargo build --locked --package rootlight-daemon --package rootlight-mcp --package xtask
      - name: Run vertical-slice integration check
        shell: bash
        run: cargo run --locked --quiet --package xtask -- mcp-vertical-check --bin-dir target/debug --output-dir artifacts/vertical-slice/${{ matrix.os }}
      - name: Upload vertical-slice evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vertical-slice-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/vertical-slice/${{ matrix.os }}/summary.json
            artifacts/vertical-slice/${{ matrix.os }}/transcript.jsonl
            artifacts/vertical-slice/${{ matrix.os }}/failure.json
          if-no-files-found: error
          include-hidden-files: false
          overwrite: false

  supply-chain:
    name: supply chain / linux
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned Rust
        run: rustup show active-toolchain
      - name: Install checksum-verified policy tools
        run: bash scripts/install-policy-tools.sh "$HOME/.local/bin"
      - name: Acquire audit inputs
        run: |
          cargo fetch --locked
          bash scripts/download-rustsec-database.sh artifacts/rustsec-db
          bash scripts/download-osv-database.sh artifacts/osv-db
      - name: Dependency, license, source, and advisory policy
        run: |
          cargo deny check bans licenses sources
          cargo audit --db artifacts/rustsec-db --no-fetch -D warnings
          OSV_SCANNER_LOCAL_DB_CACHE_DIRECTORY="$PWD/artifacts/osv-db" \
            osv-scanner scan source --offline --format json --lockfile Cargo.lock \
            > artifacts/osv-report.json
      - name: Secret scan
        run: gitleaks git --redact=100 --no-banner --no-color --log-level warn .
      - name: Security negative controls
        run: bash scripts/policy-negative-controls.sh
      - name: Unsafe inventory
        shell: bash
        run: bash scripts/run-geiger.sh "$HOME/.local/bin/cargo-geiger" artifacts/geiger
      - name: Generate deterministic SBOM inputs
        run: |
          bash scripts/generate-sbom.sh artifacts/sbom-first
          bash scripts/generate-sbom.sh artifacts/sbom-second
          diff -ru artifacts/sbom-first artifacts/sbom-second
      - name: Reject host paths in generated evidence
        run: |
          if grep --recursive --fixed-strings --binary-files=without-match "$PWD" \
            artifacts/sbom-first artifacts/sbom-second artifacts/osv-report.json; then
            echo "supply-chain evidence contains the checkout path" >&2
            exit 1
          fi

  offline:
    name: offline / blocked egress / linux
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pinned Rust
        run: rustup show active-toolchain
      - name: Fetch locked inputs without compiling project code
        run: bash scripts/prepare-offline.sh
      - name: Build and test after kernel-enforced egress denial
        run: |
          sudo RUNNER_HOME="$HOME" RUNNER_PATH="$PATH" \
            bash scripts/run-in-network-namespace.sh scripts/run-offline-tests.sh

  parser-evidence:
    name: parser fallback evidence / linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pinned Rust
        run: rustup show active-toolchain
      - name: Generate deterministic parser fallback envelope
        env:
          SOURCE_REVISION: ${{ github.sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$SOURCE_REVISION"
          cargo build --locked --release --package rootlight-bench --bin parser-evidence
          target/release/parser-evidence \
            --source-revision "$SOURCE_REVISION" > target/rootlight-parser-benchmark-v1.json
          target/release/parser-evidence \
            --source-revision "$SOURCE_REVISION" > target/rootlight-parser-benchmark-v1.second.json
          cmp target/rootlight-parser-benchmark-v1.json target/rootlight-parser-benchmark-v1.second.json
          target/release/parser-evidence \
            --verify < target/rootlight-parser-benchmark-v1.json
          if grep --fixed-strings --binary-files=without-match "$PWD" \
            target/rootlight-parser-benchmark-v1.json; then
            echo "parser evidence contains the checkout path" >&2
            exit 1
          fi
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path("target/rootlight-parser-benchmark-v1.json")
          encoded = path.read_bytes()
          envelope = json.loads(encoded)
          expected = {
              "schema_version": "rootlight.parser-ci-evidence/1",
              "evidence_status": "deterministic_fallback",
              "record_set_count": 2,
              "dataset_record_count": 4,
              "dataset_record_bytes": 825,
              "dataset_record_sha256": (
                  "990f996b75507cd26bef61dbaeace897"
                  "5bb7e5b81113de74a623448f926dc074"
              ),
              "sample_record_count": 44,
              "sample_record_bytes": 7200,
              "sample_record_sha256": (
                  "eb98d07b2bd81e2918fe465424060768"
                  "b49f72b31133d6434d25f29aa25127cc"
              ),
          }
          observed = {key: envelope.get(key) for key in expected}
          if observed != expected:
              raise SystemExit(
                  f"parser evidence fixed contract mismatch: {observed!r}"
              )
          if len(encoded) > 256 * 1024:
              raise SystemExit("parser evidence exceeds its single-file ceiling")
          print(
              "verified parser fallback envelope "
              f"bytes={len(encoded)} sha256={hashlib.sha256(encoded).hexdigest()}"
          )
          PY
      - name: Upload immutable parser fallback envelope
        id: evidence-upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rootlight-parser-benchmark-v1-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: target/rootlight-parser-benchmark-v1.json
          if-no-files-found: error
          retention-days: 90
          overwrite: false
          include-hidden-files: false
      - name: Record immutable artifact identity
        env:
          ARTIFACT_ID: ${{ steps.evidence-upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.evidence-upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.evidence-upload.outputs.artifact-digest }}
        run: |
          {
            echo "### Parser fallback evidence"
            echo
            echo "- artifact id: \`$ARTIFACT_ID\`"
            echo "- artifact url: $ARTIFACT_URL"
            echo "- artifact digest: \`$ARTIFACT_DIGEST\`"
          } >> "$GITHUB_STEP_SUMMARY"

  semantic-evidence:
    name: semantic fallback evidence / linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pinned Rust
        run: rustup show active-toolchain
      - name: Generate deterministic semantic fallback envelope
        env:
          SOURCE_REVISION: ${{ github.sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$SOURCE_REVISION"
          cargo build --locked --release --package rootlight-bench --bin semantic-evidence
          target/release/semantic-evidence \
            --source-revision "$SOURCE_REVISION" > target/rootlight-semantic-evidence-v1.json
          target/release/semantic-evidence \
            --source-revision "$SOURCE_REVISION" > target/rootlight-semantic-evidence-v1.second.json
          cmp target/rootlight-semantic-evidence-v1.json target/rootlight-semantic-evidence-v1.second.json
          if grep --fixed-strings --binary-files=without-match "$PWD" \
            target/rootlight-semantic-evidence-v1.json; then
            echo "semantic evidence contains the checkout path" >&2
            exit 1
          fi
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          path = Path("target/rootlight-semantic-evidence-v1.json")
          encoded = path.read_bytes()
          envelope = json.loads(encoded)
          expected_envelope = {
              "schema": "rootlight.semantic-evidence-envelope/1",
              "source_revision": os.environ["SOURCE_REVISION"],
          }
          observed_envelope = {
              key: envelope.get(key) for key in expected_envelope
          }
          if observed_envelope != expected_envelope:
              raise SystemExit(
                  f"semantic evidence envelope mismatch: {observed_envelope!r}"
              )

          evidence = envelope.get("evidence")
          if not isinstance(evidence, dict):
              raise SystemExit("semantic evidence payload is missing")
          expected_evidence = {
              "schema_version": "1.1",
              "corpus_id": "rootlight-semantic-contract-fixture-v1",
              "adapter_crate": "rootlight-adapters",
              "disposition": "contract_fixture_only",
              "production_acceptance_eligible": False,
          }
          observed_evidence = {
              key: evidence.get(key) for key in expected_evidence
          }
          if observed_evidence != expected_evidence:
              raise SystemExit(
                  f"semantic evidence payload mismatch: {observed_evidence!r}"
              )

          languages = evidence.get("languages")
          expected_languages = ["go", "python", "rust", "typescript"]
          if not isinstance(languages, list):
              raise SystemExit("semantic language evidence is missing")
          if [item.get("language") for item in languages] != expected_languages:
              raise SystemExit("semantic language evidence differs")
          if any(
              item.get("observed_context_imports") != 0
              or item.get("tier_promotion_eligible") is not False
              for item in languages
          ):
              raise SystemExit("semantic language evidence overstates capability")

          quality = evidence.get("resolver_quality")
          if not isinstance(quality, dict):
              raise SystemExit("semantic resolver evidence is missing")
          expected_quality = {
              "corpus_scope": "caller_supplied_contract_fixture",
              "language_breakdown_available": False,
              "holdout_available": False,
              "promotion_eligible": False,
          }
          observed_quality = {
              key: quality.get(key) for key in expected_quality
          }
          if observed_quality != expected_quality:
              raise SystemExit(
                  f"semantic resolver evidence overstates capability: {observed_quality!r}"
              )

          execution = evidence.get("repository_execution")
          if not isinstance(execution, dict):
              raise SystemExit("repository execution evidence is missing")
          if (
              execution.get("command_surface_available") is not False
              or execution.get("observed_command_attempts") != 0
              or execution.get("network_egress_available") is not False
          ):
              raise SystemExit("repository execution evidence differs")
          if len(encoded) > 128 * 1024:
              raise SystemExit("semantic evidence exceeds its single-file ceiling")
          print(
              "verified semantic fallback envelope "
              f"bytes={len(encoded)} sha256={hashlib.sha256(encoded).hexdigest()}"
          )
          PY
      - name: Upload immutable semantic fallback envelope
        id: evidence-upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rootlight-semantic-evidence-v1-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: target/rootlight-semantic-evidence-v1.json
          if-no-files-found: error
          retention-days: 90
          overwrite: false
          include-hidden-files: false
      - name: Record immutable artifact identity
        env:
          ARTIFACT_ID: ${{ steps.evidence-upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.evidence-upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.evidence-upload.outputs.artifact-digest }}
        run: |
          {
            echo "### Semantic fallback evidence"
            echo
            echo "- artifact id: \`$ARTIFACT_ID\`"
            echo "- artifact url: $ARTIFACT_URL"
            echo "- artifact digest: \`$ARTIFACT_DIGEST\`"
          } >> "$GITHUB_STEP_SUMMARY"

  adapter-isolation:
    name: adapter isolation evidence / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            reason_prefix: linux
          - os: windows-2025
            platform: windows
            reason_prefix: windows
          - os: macos-15
            platform: mac_os
            reason_prefix: macos
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pinned Rust
        shell: bash
        run: rustup show active-toolchain
      - name: Generate deterministic fail-closed isolation evidence
        shell: bash
        env:
          SOURCE_REVISION: ${{ github.sha }}
          EXPECTED_PLATFORM: ${{ matrix.platform }}
          EXPECTED_REASON_PREFIX: ${{ matrix.reason_prefix }}
        run: |
          test "$(git rev-parse HEAD)" = "$SOURCE_REVISION"
          mkdir -p artifacts/adapter-isolation
          cargo run --locked --quiet --package rootlight-adapter-host -- \
            --report --source-revision "$SOURCE_REVISION" \
            > "artifacts/adapter-isolation/$EXPECTED_PLATFORM.json"
          cargo run --locked --quiet --package rootlight-adapter-host -- \
            --report --source-revision "$SOURCE_REVISION" \
            > "artifacts/adapter-isolation/$EXPECTED_PLATFORM.second.json"
          cmp \
            "artifacts/adapter-isolation/$EXPECTED_PLATFORM.json" \
            "artifacts/adapter-isolation/$EXPECTED_PLATFORM.second.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          expected_controls = [
              "filesystem_view",
              "temporary_directory",
              "network_egress",
              "process_creation",
              "memory",
              "cpu",
              "handles",
              "dynamic_library_search",
              "descendant_cleanup",
          ]
          platform = os.environ["EXPECTED_PLATFORM"]
          path = Path(f"artifacts/adapter-isolation/{platform}.json")
          evidence = json.loads(path.read_bytes())
          expected = {
              "schema": "rootlight.adapter-isolation/1",
              "source_revision": os.environ["SOURCE_REVISION"],
              "platform": platform,
              "activation": "structural_fallback",
              "deep_adapter_permitted": False,
              "structural_fallback_active": True,
          }
          observed = {key: evidence.get(key) for key in expected}
          if observed != expected:
              raise SystemExit(
                  f"adapter isolation evidence mismatch: {observed!r}"
              )
          controls = evidence.get("controls")
          if not isinstance(controls, list):
              raise SystemExit("adapter isolation controls are missing")
          if [item.get("control") for item in controls] != expected_controls:
              raise SystemExit("adapter isolation controls differ")
          expected_reason = (
              f"{os.environ['EXPECTED_REASON_PREFIX']}"
              "_native_enforcement_not_implemented"
          )
          if any(
              item.get("enforced") is not False
              or item.get("reason_code") != expected_reason
              for item in controls
          ):
              raise SystemExit("adapter isolation fallback evidence differs")
          if path.stat().st_size > 16 * 1024:
              raise SystemExit("adapter isolation evidence exceeds its ceiling")
          PY
          if grep --fixed-strings --binary-files=without-match "$PWD" \
            "artifacts/adapter-isolation/$EXPECTED_PLATFORM.json"; then
            echo "adapter isolation evidence contains the checkout path" >&2
            exit 1
          fi
      - name: Upload immutable adapter isolation evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: adapter-isolation-${{ matrix.platform }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/adapter-isolation/${{ matrix.platform }}.json
          if-no-files-found: error
          retention-days: 90
          overwrite: false
          include-hidden-files: false

  ci-ok:
    name: ci-ok
    if: always()
    needs: [fast, msrv, current-stable, platform, vertical-slice, supply-chain, offline, parser-evidence, semantic-evidence, adapter-isolation]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every foundation, daemon, vertical-slice, and evidence gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          expected = {name: "success" for name in needs}
          expected["parser-evidence"] = (
              "success"
              if os.environ["EVENT_NAME"] == "push"
              and os.environ["EVENT_REF"] == "refs/heads/main"
              else "skipped"
          )
          expected["semantic-evidence"] = (
              "success"
              if os.environ["EVENT_NAME"] == "push"
              and os.environ["EVENT_REF"] == "refs/heads/main"
              else "skipped"
          )
          failures = {}
          for name, result in needs.items():
              observed = result.get("result")
              if observed != expected[name]:
                  failures[name] = {
                      "expected": expected[name],
                      "observed": observed,
                  }
          if failures:
              print(f"required CI jobs did not succeed: {failures}", file=sys.stderr)
              raise SystemExit(1)
          print(
              "all required foundation, daemon, vertical-slice, and evidence jobs "
              "satisfied their requirements"
          )
          PY
