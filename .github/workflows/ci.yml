name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  fast:
    name: fast / pinned / linux
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pinned Rust
        run: rustup show active-toolchain
      - name: Fetch locked dependencies
        run: cargo fetch --locked
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --all-features --no-deps --locked
      - name: Tests
        run: cargo test --workspace --all-features --locked
      - name: Architecture and contracts
        run: |
          cargo run --locked --quiet --package xtask -- architecture-check
          cargo run --locked --quiet --package xtask -- generate --check
          cargo run --locked --quiet --package xtask -- compatibility-check
          cargo run --locked --quiet --package xtask -- policy-check
          cargo run --locked --quiet --package xtask -- id-vectors > target/id-vectors.actual.json
          cmp tests/fixtures/id-vectors.json target/id-vectors.actual.json
      - name: Daemon lifecycle
        run: |
          cargo build --locked --package rootlight --package rootlight-daemon --package xtask
          cargo run --locked --quiet --package xtask -- daemon-lifecycle-check --bin-dir target/debug
      - name: Clean generated tree
        run: git diff --exit-code

  msrv:
    name: msrv / 1.90.0 / linux
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      RUSTUP_TOOLCHAIN: "1.90.0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install MSRV
        run: |
          rustup toolchain install 1.90.0 --profile minimal --component clippy,rustfmt
          test "$(rustc --version)" = "$(rustup run 1.90.0 rustc --version)"
      - name: MSRV quality suite
        env:
          RUSTDOCFLAGS: -D warnings
        run: |
          cargo check --workspace --all-targets --all-features --locked
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked
          cargo doc --workspace --all-features --no-deps --locked
          cargo run --locked --quiet --package xtask -- architecture-check
          cargo run --locked --quiet --package xtask -- generate --check
          cargo run --locked --quiet --package xtask -- compatibility-check
          cargo run --locked --quiet --package xtask -- policy-check

  current-stable:
    name: current stable / linux
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install current stable Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          test "$(rustc --version)" = "$(rustup run stable rustc --version)"
      - name: Current-stable quality canary
        run: |
          cargo check --workspace --all-targets --all-features --locked
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          cargo test --workspace --all-features --locked

  platform:
    name: platform / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, macos-15]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pinned Rust
        shell: bash
        run: rustup show active-toolchain
      - name: Platform contract suite
        shell: bash
        run: |
          cargo check --workspace --all-targets --all-features --locked
          cargo test --workspace --all-features --locked
          cargo run --locked --quiet --package xtask -- architecture-check
          cargo run --locked --quiet --package xtask -- generate --check
          cargo run --locked --quiet --package xtask -- compatibility-check
          cargo run --locked --quiet --package xtask -- policy-check
          cargo run --locked --quiet --package xtask -- id-vectors > target/id-vectors.actual.json
      - name: Daemon lifecycle
        shell: bash
        run: |
          cargo build --locked --package rootlight --package rootlight-daemon --package xtask
          cargo run --locked --quiet --package xtask -- daemon-lifecycle-check --bin-dir target/debug
      - name: Compare identifier vectors
        shell: pwsh
        run: |
          $expected = (Get-Content tests/fixtures/id-vectors.json -Raw).Replace("`r`n", "`n")
          $actual = (Get-Content target/id-vectors.actual.json -Raw).Replace("`r`n", "`n")
          if ($actual -cne $expected) {
            throw "identifier vectors differ from the committed fixture"
          }
      - name: Clean generated tree
        shell: bash
        run: git diff --exit-code

  supply-chain:
    name: supply chain / linux
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned Rust
        run: rustup show active-toolchain
      - name: Install checksum-verified policy tools
        run: bash scripts/install-policy-tools.sh "$HOME/.local/bin"
      - name: Acquire audit inputs
        run: |
          cargo fetch --locked
          bash scripts/download-rustsec-database.sh artifacts/rustsec-db
          bash scripts/download-osv-database.sh artifacts/osv-db
      - name: Dependency, license, source, and advisory policy
        run: |
          cargo deny check bans licenses sources
          cargo audit --db artifacts/rustsec-db --no-fetch -D warnings
          OSV_SCANNER_LOCAL_DB_CACHE_DIRECTORY="$PWD/artifacts/osv-db" \
            osv-scanner scan source --offline --format json --lockfile Cargo.lock \
            > artifacts/osv-report.json
      - name: Secret scan
        run: gitleaks git --redact=100 --no-banner --no-color --log-level warn .
      - name: Security negative controls
        run: bash scripts/policy-negative-controls.sh
      - name: Unsafe inventory
        shell: bash
        run: bash scripts/run-geiger.sh "$HOME/.local/bin/cargo-geiger" artifacts/geiger
      - name: Generate deterministic SBOM inputs
        run: |
          bash scripts/generate-sbom.sh artifacts/sbom-first
          bash scripts/generate-sbom.sh artifacts/sbom-second
          diff -ru artifacts/sbom-first artifacts/sbom-second
      - name: Reject host paths in generated evidence
        run: |
          if grep --recursive --fixed-strings --binary-files=without-match "$PWD" \
            artifacts/sbom-first artifacts/sbom-second artifacts/osv-report.json; then
            echo "supply-chain evidence contains the checkout path" >&2
            exit 1
          fi

  offline:
    name: offline / blocked egress / linux
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pinned Rust
        run: rustup show active-toolchain
      - name: Fetch locked inputs without compiling project code
        run: bash scripts/prepare-offline.sh
      - name: Build and test after kernel-enforced egress denial
        run: |
          sudo RUNNER_HOME="$HOME" RUNNER_PATH="$PATH" \
            bash scripts/run-in-network-namespace.sh scripts/run-offline-tests.sh

  m05-evidence:
    name: parser fallback evidence / linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pinned Rust
        run: rustup show active-toolchain
      - name: Generate deterministic BENCH-PARSE-001 fallback envelope
        env:
          SOURCE_REVISION: ${{ github.sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$SOURCE_REVISION"
          cargo build --locked --release --package rootlight-bench --bin m05-parser-evidence
          target/release/m05-parser-evidence \
            --source-revision "$SOURCE_REVISION" > target/BENCH-PARSE-001.json
          target/release/m05-parser-evidence \
            --source-revision "$SOURCE_REVISION" > target/BENCH-PARSE-001.second.json
          cmp target/BENCH-PARSE-001.json target/BENCH-PARSE-001.second.json
          target/release/m05-parser-evidence \
            --verify < target/BENCH-PARSE-001.json
          if grep --fixed-strings --binary-files=without-match "$PWD" \
            target/BENCH-PARSE-001.json; then
            echo "parser evidence contains the checkout path" >&2
            exit 1
          fi
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          path = Path("target/BENCH-PARSE-001.json")
          encoded = path.read_bytes()
          envelope = json.loads(encoded)
          expected = {
              "schema_version": "rootlight.m05-ci-evidence/1",
              "evidence_status": "deterministic_fallback",
              "record_set_count": 2,
              "dataset_record_count": 4,
              "dataset_record_bytes": 825,
              "dataset_record_sha256": (
                  "990f996b75507cd26bef61dbaeace897"
                  "5bb7e5b81113de74a623448f926dc074"
              ),
              "sample_record_count": 44,
              "sample_record_bytes": 7200,
              "sample_record_sha256": (
                  "eb98d07b2bd81e2918fe465424060768"
                  "b49f72b31133d6434d25f29aa25127cc"
              ),
          }
          observed = {key: envelope.get(key) for key in expected}
          if observed != expected:
              raise SystemExit(
                  f"parser evidence fixed contract mismatch: {observed!r}"
              )
          if len(encoded) > 256 * 1024:
              raise SystemExit("parser evidence exceeds its single-file ceiling")
          print(
              "verified parser fallback envelope "
              f"bytes={len(encoded)} sha256={hashlib.sha256(encoded).hexdigest()}"
          )
          PY
      - name: Upload immutable BENCH-PARSE-001 envelope
        id: evidence-upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: BENCH-PARSE-001-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: target/BENCH-PARSE-001.json
          if-no-files-found: error
          retention-days: 90
          overwrite: false
          include-hidden-files: false
      - name: Record immutable artifact identity
        env:
          ARTIFACT_ID: ${{ steps.evidence-upload.outputs.artifact-id }}
          ARTIFACT_URL: ${{ steps.evidence-upload.outputs.artifact-url }}
          ARTIFACT_DIGEST: ${{ steps.evidence-upload.outputs.artifact-digest }}
        run: |
          {
            echo "### BENCH-PARSE-001 fallback evidence"
            echo
            echo "- artifact id: \`$ARTIFACT_ID\`"
            echo "- artifact url: $ARTIFACT_URL"
            echo "- artifact digest: \`$ARTIFACT_DIGEST\`"
          } >> "$GITHUB_STEP_SUMMARY"

  ci-ok:
    name: ci-ok
    if: always()
    needs: [fast, msrv, current-stable, platform, supply-chain, offline, m05-evidence]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every foundation and daemon gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_REF: ${{ github.ref }}
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          expected = {name: "success" for name in needs}
          expected["m05-evidence"] = (
              "success"
              if os.environ["EVENT_NAME"] == "push"
              and os.environ["EVENT_REF"] == "refs/heads/main"
              else "skipped"
          )
          failures = {}
          for name, result in needs.items():
              observed = result.get("result")
              if observed != expected[name]:
                  failures[name] = {
                      "expected": expected[name],
                      "observed": observed,
                  }
          if failures:
              print(f"required CI jobs did not succeed: {failures}", file=sys.stderr)
              raise SystemExit(1)
          print("all required foundation, daemon, and evidence CI jobs satisfied their gates")
          PY
